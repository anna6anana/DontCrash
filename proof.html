    .options { display: flex; flex-direction: column; gap: 3px; }

    .opt-letter { min-width: 18px; font-weight: bold; color: #555; }

    .filter-bar button {
      padding: 6px 14px; border-radius: 50px; border: 2px solid #ccc;
      background: #fff; cursor: pointer; font-size: 0.85rem; font-weight: bold;
    }
    .filter-bar button.active { background: #333; color: #fff; border-color: #333; }
    #search { padding: 7px 14px; border-radius: 50px; border: 2px solid #ccc; font-size: 0.85rem; flex: 1; min-width: 200px; }
    .count { font-size: 0.8rem; color: #888; margin-left: auto; }
    .rules-color   { background: #ff6b6b; }
    .signs-color   { background: #ffb347; }
    .signals-color { background: #7ec8e3; }
  </style>
</head>

// ============================================================
//  FRENZY DATA  (T/F format)
//  We'll generate T/F by taking a correct statement (TRUE)
//  or a wrong statement (FALSE) for each question.
// ============================================================
function buildFrenzyQuestions() {
  const frenzy = [];

  // --- 20 MCQ-based T/F from ROAD_RULES ---
  const rulesSample = shuffle([...ROAD_RULES]).slice(0, 20);
  rulesSample.forEach(q => {
    const isTrueVariant = Math.random() < 0.5;
    if (isTrueVariant) {
      frenzy.push({
        q: `TRUE or FALSE: "${q.options[q.answer]}" is the correct answer to: ${q.q}`,
        answer: true,
        category: "rules"
      });
    } else {
      const wrongIdx = (q.answer + 1 + Math.floor(Math.random() * 3)) % q.options.length;
      frenzy.push({
        q: `TRUE or FALSE: "${q.options[wrongIdx]}" is the correct answer to: ${q.q}`,
        answer: false,
        category: "rules"
      });
    }
  });

  // --- 12 Sign T/F ---
  const signsSample = shuffle([...ROAD_SIGNS]).slice(0, 12);
  signsSample.forEach(q => {
    const isTrueVariant = Math.random() < 0.5;
    if (isTrueVariant) {
      frenzy.push({
        q: `TRUE or FALSE: "${q.options[q.answer]}" is the correct answer to: ${q.q}`,
        answer: true,
        category: "signs"
      });
    } else {
      const wrongIdx = (q.answer + 1 + Math.floor(Math.random() * 3)) % q.options.length;
      frenzy.push({
        q: `TRUE or FALSE: "${q.options[wrongIdx]}" is the correct answer to: ${q.q}`,
        answer: false,
        category: "signs"
      });
    }
  });

  // --- 6 Signal T/F ---
  const signalsSample = shuffle([...HAND_SIGNALS]).slice(0, 6);
  signalsSample.forEach(q => {
    const isTrueVariant = Math.random() < 0.5;
    if (isTrueVariant) {
      frenzy.push({
        q: `TRUE or FALSE: "${q.options[q.answer]}" is the correct answer to: ${q.q}`,
        answer: true,
        category: "signals"
      });
    } else {
      const wrongIdx = (q.answer + 1 + Math.floor(Math.random() * 3)) % q.options.length;
      frenzy.push({
        q: `TRUE or FALSE: "${q.options[wrongIdx]}" is the correct answer to: ${q.q}`,
        answer: false,
        category: "signals"
      });
    }
  });

  return frenzy; // 38 total, in category order
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getSignImage(name) {
  return SIGN_IMAGES[name] || null;
}

const LETTERS = ['a','b','c','d'];
let currentFilter = 'all';

const SECTIONS = [
  { key: 'rules',   label: '📋 Road Rules',   color: 'rules-color',   data: ROAD_RULES },
  { key: 'signs',   label: '🚧 Road Signs',   color: 'signs-color',   data: ROAD_SIGNS },
  { key: 'signals', label: '🤚 Hand Signals', color: 'signals-color', data: HAND_SIGNALS },
];

function buildHTML(filter, searchText) {
  let html = '';
  let total = 0;
  SECTIONS.forEach(sec => {
    if (filter !== 'all' && filter !== sec.key) return;
    const search = searchText.toLowerCase();
    const qs = sec.data.filter(q =>
      !search || q.q.toLowerCase().includes(search) ||
      q.options.some(o => o.toLowerCase().includes(search))
    );
    if (!qs.length) return;
    total += qs.length;
    html += `<div class="section-title ${sec.color}">${sec.label} — ${qs.length} questions</div>`;
    qs.forEach(q => {
      const globalIdx = sec.data.indexOf(q);
      const correctAnswer = q.options[q.answer];
      const imgSrc = sec.key === 'signs' ? getSignImage(correctAnswer) : null;
      const imgCell = imgSrc
        ? `<img src="${imgSrc}" class="sign-thumb" alt="${correctAnswer}"/>`
        : `<div class="no-img"></div>`;
      html += `<div class="q-row">
        <div class="q-num">${globalIdx + 1}</div>
        ${imgCell}
        <div>
          <div class="q-text">${q.q}</div>
          <div class="options">`;
      q.options.forEach((opt, oi) => {
        const isCorrect = oi === q.answer;
        html += `<div class="opt ${isCorrect ? 'correct' : ''}">
          <span class="opt-letter">${LETTERS[oi]}.</span>
          <span>${opt}${isCorrect ? ' ✓' : ''}</span>
        </div>`;
      });
      html += `</div></div></div>`;
    });
  });
  document.getElementById('count').textContent = `${total} questions shown`;
  return html;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applySearch();
}

function applySearch() {
  const search = document.getElementById('search').value;
  document.getElementById('content').innerHTML = buildHTML(currentFilter, search);
}

document.getElementById('content').innerHTML = buildHTML('all', '');
</script>
