<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Preview — Don't Crash</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
    h1 { font-size: 1.3rem; margin-bottom: 4px; }
    p  { color: #666; font-size: 0.85rem; margin-bottom: 20px; }
    h2 { font-size: 1rem; background: #333; color: #fff; padding: 8px 14px;
         border-radius: 6px; margin: 24px 0 12px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .sign-card {
      background: white;
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .sign-card svg { width: 80px; height: 80px; }
    .sign-label {
      font-size: 0.7rem;
      color: #444;
      margin-top: 8px;
      line-height: 1.3;
    }
    .missing { border: 2px dashed #e00; }
    .missing .sign-label { color: #e00; font-weight: bold; }
  </style>
  <script src="js/signs.js"></script>
</head>
<body>
  <h1>🚦 Road Sign SVG Preview</h1>
  <p>Review every sign. Red dashed border = SVG missing or fallback. Report anything that looks wrong.</p>
  <div id="content"></div>

  <script>
    const sections = [
      {
        title: "⚠️ Danger / Warning Signs",
        signs: [
          ["Slippery Road",           "slipperyRoad"],
          ["Falling Rocks",           "fallingRocks"],
          ["Pedestrian Crossing",     "pedestrianCrossing"],
          ["Cross Wind",              "crossWind"],
          ["Diversion (Dual CW)",     "diversionDualCarriageway"],
          ["Danger",                  "danger"],
          ["Road to Quay/Riverbank",  "roadToQuay"],
          ["Loose Gravel",            "looseGravel"],
          ["Animals Crossing",        "animalsCrossing"],
          ["Carriageway Narrows",     "carriagwayNarrows"],
          ["Hump Bridge",             "humpBridge"],
          ["Headroom Restriction",    "headroomRestriction"],
          ["Intersection",            "intersection"],
          ["Road Works",              "roadWorks"],
          ["Intersection (ROW road)", "intersectionRightOfWay"],
          ["Dangerous Bend",          "dangerousBend"],
          ["Dangerous Double Bend",   "dangerousDoubleBend"],
          ["Steep Descent",           "steepDescent"],
          ["Steep Ascent",            "steepAscent"],
          ["Children Crossing",       "childrenCrossing"],
          ["Airfield",                "airfield"],
          ["Roundabout",              "roundaboutWarning"],
          ["Right Lane Closed",       "rightHandLaneClosed"],
          ["Two-way Traffic",         "twoWayTraffic"],
          ["Traffic Signals",         "trafficSignals"],
          ["Lane Closed",             "laneClosed"],
          ["Merging Traffic",         "mergingTraffic"],
          ["Machinery Crossing",      "machineryCrossing"],
          ["Sharp Deviation Left",    "sharpDeviationLeft"],
        ]
      },
      {
        title: "🛑 Regulatory Signs",
        signs: [
          ["Stop/Go — STOP",          "stopGo_stop"],
          ["Stop/Go — GO",            "stopGo_go"],
          ["Stop (School Children)",  "stopSchoolChildren"],
          ["No Entry (except MC)",    "noEntryExceptMotorcycles"],
          ["No Agricultural Vehicles","noEntryAgriculturalVehicles"],
          ["No Entry (width 2m)",     "noEntryWidth2m"],
          ["No Left Turn",            "noLeftTurn"],
          ["No Right Turn",           "noRightTurn"],
          ["No Horn",                 "noHorn"],
          ["STOP (octagon)",          "stop"],
          ["Give Way",                "giveWaySign"],
          ["Direction — Left",        "directionToFollowLeft"],
          ["Pass Either Side",        "passEitherSide"],
          ["Direction — Right",       "directionToFollowRight"],
          ["Pass This Side",          "passThisSide"],
          ["No Entry",                "noEntry"],
          ["No Entry (goods)",        "noEntryGoodsVehicles"],
          ["No Entry (5T)",           "noEntry5tonnes"],
          ["No U-Turn",               "noUTurn"],
          ["No Overtaking",           "noOvertaking"],
          ["Max Speed 80",            "maxSpeed80"],
          ["Max Speed 50",            "maxSpeed50"],
          ["Parking Prohibited",      "parkingProhibited"],
          ["Stopping Prohibited",     "stoppingProhibited"],
          ["No Entry (height 3.5m)",  "noEntryHeight3_5m"],
          ["No Entry (2T axle)",      "noEntry2tonnesAxle"],
          ["No Entry (10m length)",   "noEntry10mLength"],
        ]
      },
      {
        title: "ℹ️ Informative Signs",
        signs: [
          ["Hospital",                "hospital"],
          ["Parking Permitted",       "parkingPermitted"],
          ["Direction Sign",          "directionSign"],
          ["Dual Carriageway Ahead",  "dualCarriagewayAhead"],
          ["Informative Sign",        "informativeSign"],
          ["No Through Road",         "noThroughRoad"],
          ["No Through Road (lane)",  "noThroughRoadLane"],
          ["Keep Left (overtaking)",  "keepLeft"],
          ["No Through Road (dir.)",  "noThroughRoadDirection"],
        ]
      }
    ];

    let html = '';
    sections.forEach(sec => {
      html += `<h2>${sec.title}</h2><div class="grid">`;
      sec.signs.forEach(([label, key]) => {
        const fn = SVG[key];
        const svgStr = fn ? fn.call(SVG) : null;
        const isFallback = !fn;
        html += `<div class="sign-card ${isFallback ? 'missing' : ''}">
          ${svgStr || `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#eee" stroke="#e00" stroke-width="4"/><text x="50" y="65" text-anchor="middle" font-size="40" fill="#e00" font-family="Arial">?</text></svg>`}
          <div class="sign-label">${label}</div>
        </div>`;
      });
      html += `</div>`;
    });

    document.getElementById('content').innerHTML = html;
  </script>
</body>
</html>
